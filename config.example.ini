# Wardrive uploader configuration.
# Installed to /etc/wardrive-uploader/config.ini (chmod 600) by install.sh.
# NEVER commit a filled-in copy of this file - it holds your API secrets.

[wigle]
enabled = true
# From https://wigle.net/account  ->  "Show my token"  (API Name + API Token)
api_name =
api_token =
# Donate observations to WiGLE (recommended; required for some upload credit).
donate = true

[wdgowars]
# UNVERIFIED API - endpoint/field names may need adjusting to match your
# logged-in wdgowars docs. Left non-blocking by default (see [upload] required).
enabled = true
# From https://wdgwars.pl/profile  ->  "Generate API key"
api_key =
endpoint = https://wdgwars.pl/api/upload-csv
field = file

[upload]
# Comma-separated uploaders that MUST succeed before originals are archived.
# Keep this = wigle so a wdgowars hiccup never strands your logs.
required = wigle
retries = 3
timeout = 120

[archive]
# Folder created on the SD card; originals are moved here after a good upload.
oncard_folder = archive
# Permanent copy kept on the Pi (originals + combined file + meta.json).
local_dir = /var/lib/wardrive-uploader/archive
# Retention: prune oldest runs beyond N runs OR total MB (0 = unlimited).
retention_runs = 50
retention_mb = 500

[scan]
# Folder names skipped during the recursive card scan.
exclude_dirs = archive,System Volume Information,.Trash-1000,.Spotlight-V100,.fseventsd

[display]
# Scroll pHAT base brightness 0-255 and rotation (0 or 180 if mounted upside down).
brightness = 128
rotate = 0
