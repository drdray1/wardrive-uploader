# Wardrive uploader configuration.
# Installed to /etc/wardrive-uploader/config.ini (chmod 600) by install.sh.
# NEVER commit a filled-in copy of this file - it holds your API secrets.

[wigle]
enabled = true
# From https://wigle.net/account  ->  "Show my token"  (API Name + API Token)
api_name =
api_token =
# Donate observations to WiGLE (recommended; required for some upload credit).
donate = true

[wdgowars]
# UNVERIFIED API - endpoint/field names may need adjusting to match your
# logged-in wdgowars docs. Left non-blocking by default (see [upload] required).
enabled = true
# From https://wdgwars.pl/profile  ->  "Generate API key"
api_key =
endpoint = https://wdgwars.pl/api/upload-csv
field = file
# wdgowars enforces a cooldown between uploads; we wait this long between POSTs.
min_interval_seconds = 60

[upload]
# Comma-separated uploaders that MUST succeed (others are best-effort).
# Note: originals are archived on the card immediately after copy, BEFORE
# upload - so a failed upload never strands your logs; it just retries.
required = wigle
retries = 3          # per-attempt retries within one upload pass
max_attempts = 10    # background retry passes before a run is given up
timeout = 120
# Both WiGLE and wdgowars cap uploads at 15 MB; split the merged data into
# parts no bigger than this (leave headroom under 15).
max_upload_mb = 14

[archive]
# Folder created on the SD card; originals are moved here after a good upload.
oncard_folder = archive
# Permanent copy kept on the Pi (originals + combined file + meta.json).
local_dir = /var/lib/wardrive-uploader/archive
# Retention: prune oldest runs beyond N runs OR total MB (0 = unlimited).
retention_runs = 50
retention_mb = 500

[scan]
# Folder names skipped during the recursive card scan.
exclude_dirs = archive,System Volume Information,.Trash-1000,.Spotlight-V100,.fseventsd

[merge]
# How to combine logs. WiGLE/wdgowars both dedupe server-side, so this only
# affects the local file size + merge speed:
#   lines  = stream + drop byte-identical duplicate rows (fast, default)
#   none   = pure concatenation, no dedup (fastest, largest file)
#   fields = parse + dedup on MAC+FirstSeen (smallest file, slowest)
dedup = lines

[display]
# Scroll pHAT base brightness 0-255 and rotation (0 or 180 if mounted upside down).
brightness = 128
rotate = 0
